    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f4f4f4;
            --surface: #ffffff;
            --surface-2: #fafafa;
            --border: #d0d0d0;
            --border-light: #e8e8e8;
            --red: #b00020;      --red-dim: #f5e6e9;
            --green: #006400;    --green-dim: #e6f0e6;
            --blue: #003580;     --blue-dim: #e6ecf5;
            --orange: #7a3b00;   --orange-dim: #f5ece6;
            --purple: #4a0070;   --purple-dim: #f0e6f5;
            --text: #1a1a1a;
            --muted: #666;
            --muted-2: #999;
            --sans: 'IBM Plex Sans', sans-serif;
            --mono: 'IBM Plex Mono', monospace;
            --sidebar-w: 260px;
        }

        html { scroll-behavior: smooth;   scroll-padding-top: 55px; }
        body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; }

        /* ─── UPLOAD SCREEN ─── */
        #uploadScreen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            gap: 1.5rem;
        }

        .upload-logo { font-family: var(--mono); font-size: .75rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

        .upload-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--text);
            width: 100%;
            max-width: 520px;
            padding: 2rem;
        }

        .upload-title { font-size: 1rem; font-weight: 700; margin-bottom: .35rem; }
        .upload-sub { font-size: .75rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }

        .drop-zone {
            border: 1px dashed var(--border);
            background: var(--surface-2);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color .15s, background .15s;
            position: relative;
            margin-bottom: 1.25rem;
        }

        .drop-zone.drag-over { border-color: var(--text); background: #f0f0f0; }
        .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .drop-icon { font-family: var(--mono); font-size: 1.5rem; color: var(--muted-2); margin-bottom: .5rem; }
        .drop-label { font-size: .75rem; color: var(--muted); }
        .drop-label strong { color: var(--text); font-weight: 600; }

        .upload-divider { display: flex; align-items: center; gap: .75rem; margin-bottom: 1.25rem; }
        .upload-divider::before, .upload-divider::after { content: ''; flex: 1; border-top: 1px solid var(--border-light); }
        .upload-divider span { font-size: .6rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted-2); }

        .paste-area {
            width: 100%;
            font-family: var(--mono);
            font-size: .7rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: .65rem .75rem;
            color: var(--text);
            resize: vertical;
            min-height: 100px;
            outline: none;
            line-height: 1.6;
        }

        .paste-area:focus { border-color: var(--text); }
        .paste-area::placeholder { color: var(--muted-2); }

        .url-row { display: flex; gap: .5rem; }
        .url-input {
            flex: 1;
            font-family: var(--mono);
            font-size: .7rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: .45rem .65rem;
            color: var(--text);
            outline: none;
            min-width: 0;
        }
        .url-input:focus { border-color: var(--text); }

        .btn {
            font-family: var(--mono);
            font-size: .7rem;
            font-weight: 600;
            padding: .45rem 1.1rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: none;
            color: var(--text);
            transition: background .12s, border-color .12s;
            white-space: nowrap;
        }

        .btn:hover { border-color: var(--text); background: var(--bg); }
        .btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
        .btn.primary:hover { background: #333; }

        .upload-error {
            font-family: var(--mono);
            font-size: .7rem;
            color: var(--red);
            background: var(--red-dim);
            border: 1px solid #e8b4bc;
            padding: .5rem .75rem;
            margin-top: .75rem;
            display: none;
        }

        .upload-actions { display: flex; gap: .5rem; margin-top: 1rem; flex-wrap: wrap; }
        .upload-examples { font-size: .7rem; color: var(--muted); text-align: center; }
        .upload-examples a { color: var(--blue); text-decoration: none; font-family: var(--mono); font-size: .68rem; }
        .upload-examples a:hover { text-decoration: underline; }

        /* ─── APP SHELL ─── */
        #appShell { display: none; }

        .layout { display: flex; min-height: 100vh; }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header { padding: 1.25rem 1rem; border-bottom: 1px solid var(--border); }
        .api-name { font-family: var(--mono); font-weight: 600; font-size: .8rem; color: var(--text); letter-spacing: .02em; }
        .api-version { font-family: var(--mono); font-size: .65rem; color: var(--muted); margin-top: .15rem; }

        .sidebar-search { padding: .75rem 1rem; border-bottom: 1px solid var(--border-light); }

        .search-input { width: 100%; font-family: var(--mono); font-size: .7rem; background: var(--bg); border: 1px solid var(--border); padding: .4rem .65rem; color: var(--text); outline: none; }
        .search-input::placeholder { color: var(--muted-2); }
        .search-input:focus { border-color: var(--text); }

        .sidebar-nav { flex: 1; padding: .75rem 0; }
        .nav-group { margin-bottom: .25rem; }
        .nav-group-label { font-size: .6rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); padding: .5rem 1rem .25rem; }

        .nav-item { display: flex; align-items: center; gap: .5rem; padding: .3rem 1rem; cursor: pointer; text-decoration: none; color: var(--text); font-size: .75rem; transition: background .1s; }
        .nav-item:hover { background: var(--bg); }
        .nav-item.active { background: var(--bg); font-weight: 500; }

        .method-badge { font-family: var(--mono); font-size: .58rem; font-weight: 600; padding: .1rem .3rem; min-width: 36px; text-align: center; flex-shrink: 0; }
        .badge-get    { background: var(--blue-dim);   color: var(--blue); }
        .badge-post   { background: var(--green-dim);  color: var(--green); }
        .badge-put    { background: var(--orange-dim); color: var(--orange); }
        .badge-patch  { background: var(--purple-dim); color: var(--purple); }
        .badge-delete { background: var(--red-dim);    color: var(--red); }

        .nav-path { font-family: var(--mono); font-size: .68rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ── MAIN ── */
        .main { margin-left: var(--sidebar-w); flex: 1; min-width: 0; }

        /* ── TOPBAR ── */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: .85rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-left { display: flex; align-items: center; gap: .65rem; }
        .topbar-title { font-size: .65rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
        .topbar-actions { display: flex; gap: .5rem; flex-wrap: wrap; }

        .topbar-btn { font-family: var(--mono); font-size: .65rem; font-weight: 500; background: none; border: 1px solid var(--border); padding: .3rem .7rem; cursor: pointer; color: var(--text); transition: border-color .15s, background .15s; white-space: nowrap; }
        .topbar-btn:hover { border-color: var(--text); background: var(--bg); }
        .topbar-btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
        .topbar-btn.primary:hover { background: #333; }

        /* ── CONTENT ── */
        .content { padding: 2rem; max-width: 960px; }

        /* ── INFO BLOCK ── */
        .info-block { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--text); padding: 1.5rem; margin-bottom: 2rem; }
        .info-title { font-size: 1.1rem; font-weight: 700; margin-bottom: .35rem; }
        .info-desc { font-size: .8rem; color: var(--muted); line-height: 1.7; }
        .info-meta { display: flex; gap: 1.5rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-light); flex-wrap: wrap; }
        .meta-label { font-size: .6rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .15rem; }
        .meta-value { font-family: var(--mono); font-size: .72rem; color: var(--text); }

        /* ── SERVER BAR ── */
        .server-bar { background: var(--surface-2); border: 1px solid var(--border); padding: .65rem 1rem; display: flex; align-items: center; gap: .75rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .server-label { font-size: .6rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); flex-shrink: 0; }
        .server-url { font-family: var(--mono); font-size: .72rem; color: var(--text); flex: 1; min-width: 0; word-break: break-all; }
        .server-select { font-family: var(--mono); font-size: .7rem; background: var(--surface); border: 1px solid var(--border); padding: .25rem .5rem; color: var(--text); cursor: pointer; }

        /* ── AUTH BLOCK ── */
        .auth-block { background: var(--surface-2); border: 1px solid var(--border); padding: 1rem; margin-bottom: 2rem; }
        .auth-row { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
        .auth-scheme { font-family: var(--mono); font-size: .7rem; background: var(--text); color: #fff; padding: .25rem .65rem; flex-shrink: 0; }
        .auth-input { flex: 1; min-width: 0; font-family: var(--mono); font-size: .72rem; background: var(--surface); border: 1px solid var(--border); padding: .4rem .7rem; color: var(--text); outline: none; }
        .auth-input:focus { border-color: var(--text); }
        .auth-btn { font-family: var(--mono); font-size: .68rem; font-weight: 600; background: var(--text); color: #fff; border: none; padding: .4rem 1rem; cursor: pointer; }

        /* ── SECTION HEADING ── */
        .section-heading { font-size: .6rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: .75rem; padding-bottom: .4rem; border-bottom: 1px solid var(--border-light); }

        /* ── ENDPOINT CARD ── */
        .endpoint { background: var(--surface); border: 1px solid var(--border); margin-top: .5rem; overflow: hidden; }

        .endpoint-header { display: flex; align-items: center; gap: .75rem; padding: .85rem 1rem; cursor: pointer; user-select: none; transition: background .1s; flex-wrap: wrap; }
        .endpoint-header:hover { background: var(--surface-2); }
        .endpoint.open .endpoint-header { background: var(--surface-2); border-bottom: 1px solid var(--border); }

        .method-tag { font-family: var(--mono); font-size: .7rem; font-weight: 600; padding: .2rem .5rem; min-width: 52px; text-align: center; flex-shrink: 0; }
        .endpoint-path { font-family: var(--mono); font-size: .78rem; color: var(--text); flex: 1; }
        .endpoint-summary { font-size: .72rem; color: var(--muted); }
        .endpoint-toggle { font-family: var(--mono); font-size: .65rem; color: var(--muted-2); flex-shrink: 0; margin-left: auto; }

        .deprecated-badge { font-family: var(--mono); font-size: .58rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; background: var(--orange-dim); color: var(--orange); padding: .15rem .4rem; }

        .endpoint-body { display: none; padding: 1.25rem; }
        .endpoint.open .endpoint-body { display: block; overflow-x: auto; }

        .endpoint-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }

        .field-section { margin-bottom: 1.25rem; }
        .field-section:last-child { margin-bottom: 0; }
        .field-section-title { font-size: .6rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; }

        .param-table { width: 100%; border-collapse: collapse; }
        .param-table th { font-size: .6rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); text-align: left; padding: .35rem .5rem; border-bottom: 1px solid var(--border); }
        .param-table td { padding: .45rem .5rem; border-bottom: 1px solid var(--border-light); vertical-align: top; }
        .param-name { font-family: var(--mono); font-size: .72rem; color: var(--text); }
        .param-required { font-family: var(--mono); font-size: .6rem; color: var(--red); margin-left: .15rem; }
        .param-type { font-family: var(--mono); font-size: .65rem; color: var(--blue); }
        .param-in { font-family: var(--mono); font-size: .65rem; color: var(--muted); background: var(--bg); padding: .05rem .3rem; }
        .param-desc { font-size: .7rem; color: var(--muted); word-break: break-word; }

        .schema-tree { background: var(--surface-2); border: 1px solid var(--border-light); padding: .75rem; }
        .schema-row { display: flex; gap: .75rem; padding: .2rem 0; align-items: baseline; flex-wrap: wrap; }
        .schema-key { font-family: var(--mono); font-size: .7rem; color: var(--text); min-width: 120px; }
        .schema-type { font-family: var(--mono); font-size: .65rem; color: var(--blue); min-width: 60px; }
        .schema-desc { font-size: .68rem; color: var(--muted); }
        .schema-req { color: var(--red); font-size: .6rem; }

        .code-block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .4rem; }
        .code-lang { font-family: var(--mono); font-size: .6rem; color: var(--muted-2); text-transform: uppercase; letter-spacing: .08em; }
        .copy-btn { font-family: var(--mono); font-size: .6rem; background: none; border: 1px solid #444; color: #aaa; padding: .2rem .5rem; cursor: pointer; transition: border-color .15s, color .15s; }
        .copy-btn:hover { border-color: #888; color: #eee; }
        .code-block { background: #1a1a1a; color: #e8e8e8; font-family: var(--mono); font-size: .7rem; line-height: 1.7; padding: 1rem; overflow-x: auto; white-space: pre; }

        .tok-key  { color: #79b8ff; }
        .tok-str  { color: #9ecbff; }
        .tok-num  { color: #f8c555; }
        .tok-bool { color: #f97583; }
        .tok-null { color: #f97583; }

        .resp-tabs { display: flex; margin-bottom: .75rem; }
        .resp-tab { font-family: var(--mono); font-size: .65rem; font-weight: 500; padding: .35rem .75rem; border: 1px solid var(--border); border-right: none; background: var(--surface-2); cursor: pointer; color: var(--muted); transition: background .1s; }
        .resp-tab:last-child { border-right: 1px solid var(--border); }
        .resp-tab.active { background: var(--surface); color: var(--text); border-bottom-color: var(--surface); }
        .resp-tab.s2xx { color: var(--green); }
        .resp-tab.s4xx { color: var(--orange); }
        .resp-tab.s5xx { color: var(--red); }

        .resp-panel { display: none; }
        .resp-panel.active { display: block; }

        .status-chip { display: inline-flex; align-items: center; gap: .35rem; font-family: var(--mono); font-size: .65rem; font-weight: 600; padding: .2rem .5rem; margin-bottom: .5rem; }
        .status-chip.s2xx { background: var(--green-dim); color: var(--green); }
        .status-chip.s4xx { background: var(--orange-dim); color: var(--orange); }
        .status-chip.s5xx { background: var(--red-dim); color: var(--red); }
        .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

        /* ── MOBILE NAV TOGGLE ── */
        .nav-toggle { display: none; align-items: center; gap: .5rem; font-family: var(--mono); font-size: .7rem; font-weight: 600; background: none; border: 1px solid var(--border); padding: .35rem .65rem; cursor: pointer; color: var(--text); }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 99; }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            .endpoint-grid { grid-template-columns: 1fr; }
            .content { padding: 1.25rem 1rem; }
            .topbar { padding: .7rem 1rem; }
            .topbar-title { display: none; }
        }

        @media (max-width: 720px) {
            .sidebar { transform: translateX(-100%); transition: transform .22s ease; z-index: 200; }
            .sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,.12); }
            .sidebar-overlay.open { display: block; }
            .main { margin-left: 0; }
            .nav-toggle { display: flex; }
            .topbar { padding: .6rem .75rem; }
            .topbar-btn.primary { display: none; }
            .content { padding: 1rem .75rem; }
            .endpoint-summary { flex-basis: 100%; order: 3; font-size: .68rem; }
            .server-select { width: 100%; }
        }

        @media (max-width: 420px) {
            .topbar-btn { padding: .3rem .45rem; font-size: .6rem; }
            .endpoint-path { font-size: .7rem; }
            .method-tag { min-width: 44px; font-size: .62rem; }
            .topbar-actions { gap: .25rem; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }
    </style>
</head>
<body>

<!-- UPLOAD SCREEN -->
<div id="uploadScreen">
    <div class="upload-logo">Terranova OpenAPI Renderer</div>
    <div class="upload-card">
        <div class="upload-title">Load your API spec</div>
        <div class="upload-sub">Drop an OpenAPI 3.x or Swagger 2.0 file (JSON or YAML), paste the spec directly, or load from a public URL.</div>

        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept=".json,.yaml,.yml" onchange="handleFile(this.files[0])"/>
            <div class="drop-icon">[↑]</div>
            <div class="drop-label"><strong>Click to browse</strong> or drag & drop<br/>.json · .yaml · .yml</div>
        </div>

        <div class="upload-divider"><span>or paste spec</span></div>
        <textarea class="paste-area" id="pasteArea" placeholder="# reload to get server spec&#10;openapi: 3.0.0&#10;info:&#10;  title: My API&#10;  version: 1.0.0&#10;paths: ..."></textarea>

        <div class="upload-divider"><span>or load from URL</span></div>
        <div class="url-row">
            <input class="url-input" id="urlInput" placeholder="https://petstore3.swagger.io/api/v3/openapi.json"/>
            <button class="btn" onclick="handleUrl()">Fetch</button>
        </div>

        <div class="upload-error" id="uploadError"></div>

        <div class="upload-actions">
            <button class="btn primary" onclick="loadFromPaste()">Render spec</button>
            <button class="btn" onclick="loadExample()">Load example</button>
        </div>
    </div>
    <div class="upload-examples">
        Try the <a href="#" onclick="loadPetstore();return false">Petstore example</a> &nbsp;·&nbsp;
        <a href="https://swagger.io/specification/" target="_blank">OAS docs ↗</a>
    </div>
</div>

<!-- APP SHELL -->
<div id="appShell">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="api-name" id="sideApiName">—</div>
                <div class="api-version" id="sideApiVersion">—</div>
            </div>
            <div class="sidebar-search">
                <input class="search-input" type="search" name="endpoint" placeholder="Search endpoints…" oninput="filterNav(this.value)"/>
            </div>
            <nav class="sidebar-nav" id="sideNav"></nav>
        </aside>

        <main class="main">
            <div class="topbar">
                <div class="topbar-left">
                    <button class="nav-toggle" onclick="toggleSidebar()">[≡] Menu</button>
                    <span class="topbar-title">API Reference</span>
                </div>
                <div class="topbar-actions">
                    <button class="topbar-btn" onclick="expandAll()">Expand all</button>
                    <button class="topbar-btn" onclick="collapseAll()">Collapse all</button>
                    <button class="topbar-btn" onclick="resetSpec()">← New spec</button>
                    <button class="topbar-btn primary" onclick="downloadSpec()">Download spec</button>
                </div>
            </div>
            <div class="content" id="mainContent"></div>
        </main>
    </div>
</div>

<script>
    // ─── STATE ───
    let currentSpec = null;
    let rawSpecText = '';

    window.addEventListener("load", async () => {
        const field = document.getElementById("pasteArea")
        if(field.value.length == 0){
            const result = await fetch("./docs.yaml");
            document.getElementById("pasteArea").value = await result.text();
        }
    });

    // ─── UPLOAD HANDLERS ───
    function showError(msg) {
        const el = document.getElementById('uploadError');
        el.textContent = msg;
        el.style.display = 'block';
    }
    function clearError() { document.getElementById('uploadError').style.display = 'none'; }

    function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => parseAndRender(e.target.result);
        reader.readAsText(file);
    }

    function loadFromPaste() {
        const text = document.getElementById('pasteArea').value.trim();
        if (!text) { showError('Paste a spec first.'); return; }
        parseAndRender(text);
    }

    async function handleUrl() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) { showError('Enter a URL.'); return; }
        clearError();
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            parseAndRender(await res.text());
        } catch(e) {
            showError('Failed to fetch: ' + e.message + '. Try pasting the spec directly (CORS may block browser fetches).');
        }
    }

    function loadExample() {
        const yaml = `openapi: 3.0.3
info:
  title: Sample API
  description: A concise sample demonstrating common OpenAPI patterns.
  version: 1.0.0
  contact:
    email: api@example.com
  license:
    name: MIT
servers:
  - url: https://api.example.com/v1
    description: Production
  - url: https://staging.example.com/v1
    description: Staging
tags:
  - name: Items
    description: Manage items
  - name: Orders
    description: Order management
paths:
  /items:
    get:
      tags: [Items]
      summary: List items
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
          description: Page number
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
          description: Items per page
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Item' }
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Items]
      summary: Create an item
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ItemInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Item' }
        '422':
          $ref: '#/components/responses/ValidationError'
  /items/{id}:
    get:
      tags: [Items]
      summary: Get an item
      parameters:
        - name: id
          in: path
          required: true

components:

    async function loadPetstore() {
        document.getElementById('urlInput').value = 'https://petstore3.swagger.io/api/v3/openapi.json';
        await handleUrl();
    }

    function parseAndRender(text) {
        clearError();
        rawSpecText = text;
        let spec;
        try { spec = JSON.parse(text); } catch(_) {
            try { spec = jsyaml.load(text); } catch(e) { showError('Could not parse spec: ' + e.message); return; }
        }
        if (!spec || typeof spec !== 'object') { showError('Invalid spec structure.'); return; }
        currentSpec = spec;
        renderDocs(spec);
    }

    function resetSpec() {
        currentSpec = null; rawSpecText = '';
        document.getElementById('appShell').style.display = 'none';
        document.getElementById('uploadScreen').style.display = 'flex';
        document.getElementById('pasteArea').value = '';
        document.getElementById('urlInput').value = '';
        clearError();
    }

    // ─── DRAG & DROP ───
    const dz = document.getElementById('dropZone');
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) handleFile(f); });

    // ─── RENDER ENGINE ───
    function renderDocs(spec) {
        document.title = (spec.info?.title || 'API') + ' Reference';
        document.getElementById('uploadScreen').style.display = 'none';
        document.getElementById('appShell').style.display = 'block';

        const info = spec.info || {};
        const servers = spec.servers || (spec.host ? [{ url: (spec.schemes?.[0] || 'https') + '://' + spec.host + (spec.basePath || '') }] : []);
        const securitySchemes = spec.components?.securitySchemes || spec.securityDefinitions || {};

        document.getElementById('sideApiName').textContent = info.title || 'Untitled API';
        document.getElementById('sideApiVersion').textContent = 'v' + (info.version || '?') + ' · OAS ' + (spec.openapi || spec.swagger || '?');

        const groups = groupByTag(spec.paths || {}, spec.tags);
        buildSidebarNav(groups);

        const content = document.getElementById('mainContent');
        content.innerHTML = '';

        content.appendChild(buildInfoBlock(info, spec.openapi || spec.swagger || '?'));
        if (Object.keys(securitySchemes).length) content.appendChild(buildAuthBlock(securitySchemes));
        if (servers.length) content.appendChild(buildServerBar(servers));

        Object.entries(groups).forEach(([tag, eps]) => {
            const h = document.createElement('div');
            h.className = 'section-heading';
            h.style.marginTop = '2rem';
            h.id = 'tag-' + slugify(tag);
            h.textContent = tag;
            content.appendChild(h);
            eps.forEach(ep => content.appendChild(buildEndpoint(ep, spec)));
        });

        const spacer = document.createElement('div');
        spacer.style.height = '3rem';
        content.appendChild(spacer);
        initScrollSpy();
    }

    function groupByTag(paths, specTags) {
        const groups = {};
        if (specTags) specTags.forEach(t => { groups[t.name] = []; });
        const methods = ['get','post','put','patch','delete','head','options'];
        Object.entries(paths).forEach(([path, item]) => {
            methods.forEach(m => {
                if (!item[m]) return;
                const op = item[m];
                const tags = op.tags?.length ? op.tags : ['Other'];
                tags.forEach(tag => { if (!groups[tag]) groups[tag] = []; groups[tag].push({ path, method: m, op }); });
            });
        });
        Object.keys(groups).forEach(k => { if (!groups[k].length) delete groups[k]; });
        return groups;
    }

    function buildSidebarNav(groups) {
        const nav = document.getElementById('sideNav');
        nav.innerHTML = '';
        Object.entries(groups).forEach(([tag, eps]) => {
            const g = document.createElement('div');
            g.className = 'nav-group';
            g.innerHTML = '<div class="nav-group-label">' + esc(tag) + '</div>';
            eps.forEach(({ path, method }) => {
                const a = document.createElement('a');
                a.className = 'nav-item';
                a.href = '#' + epId(method, path);
                a.innerHTML = '<span class="method-badge badge-' + method + '">' + method.toUpperCase() + '</span><span class="nav-path">' + esc(path) + '</span>';
                a.addEventListener('click', () => { if (window.innerWidth <= 720) closeSidebar(); });
                g.appendChild(a);
            });
            nav.appendChild(g);
        });
    }

    function buildInfoBlock(info, specVersion) {
        const d = document.createElement('div');
        d.className = 'info-block';
        d.innerHTML = '<div class="info-title">' + esc(info.title || 'Untitled API') + '</div>'
            + (info.description ? '<div class="info-desc">' + esc(info.description) + '</div>' : '')
            + '<div class="info-meta">'
            + '<div class="meta-item"><div class="meta-label">Version</div><div class="meta-value">' + esc(info.version || '—') + '</div></div>'
            + '<div class="meta-item"><div class="meta-label">Spec</div><div class="meta-value">OpenAPI ' + esc(String(specVersion)) + '</div></div>'
            + '<div class="meta-item"><div class="meta-label">License</div><div class="meta-value">' + esc(info.license?.name || '—') + '</div></div>'
            + '<div class="meta-item"><div class="meta-label">Contact</div><div class="meta-value">' + esc(info.contact?.email || info.contact?.name || '—') + '</div></div>'
            + '</div>';
        return d;
    }

    function buildAuthBlock(schemes) {
        const [name, scheme] = Object.entries(schemes)[0];
        const label = scheme.scheme?.toUpperCase() || scheme.type?.toUpperCase() || name.toUpperCase();
        const d = document.createElement('div');
        d.className = 'auth-block';
        d.innerHTML = '<div class="field-section-title" style="margin-bottom:.65rem">Authorization</div>'
            + '<div class="auth-row"><span class="auth-scheme">' + esc(label) + '</span>'
            + '<input class="auth-input" type="text" name="authorization" placeholder="Enter your API token…"/>'
            + '<button class="auth-btn">Authorize</button></div>';
        return d;
    }

    function buildServerBar(servers) {
        const d = document.createElement('div');
        d.className = 'server-bar';
        let html = '<span class="server-label">Server</span><span class="server-url" id="activeServerUrl">' + esc(servers[0].url) + '</span>';
        if (servers.length > 1) {
            html += '<select class="server-select" onchange="document.getElementById(\'activeServerUrl\').textContent=this.value">'
                + servers.map(s => '<option value="' + esc(s.url) + '">' + esc(s.description || s.url) + '</option>').join('')
                + '</select>';
        }
        d.innerHTML = html;
        return d;
    }

    function buildEndpoint({ path, method, op }, spec) {
        const id = epId(method, path);
        const d = document.createElement('div');
        d.className = 'endpoint';
        d.id = id;

        const header = document.createElement('div');
        header.className = 'endpoint-header';
        header.innerHTML = '<span class="method-tag badge-' + method + '">' + method.toUpperCase() + '</span>'
            + '<span class="endpoint-path">' + esc(path) + '</span>'
            + (op.summary ? '<span class="endpoint-summary">' + esc(op.summary) + '</span>' : '')
            + (op.deprecated ? '<span class="deprecated-badge">deprecated</span>' : '')
            + '<span class="endpoint-toggle" id="' + id + '-toggle">[+]</span>';
        header.addEventListener('click', () => toggleEndpoint(id));
        d.appendChild(header);

        const body = document.createElement('div');
        body.className = 'endpoint-body';

        const allParams = resolveParams(op.parameters || [], spec);
        const byIn = (loc) => allParams.filter(p => p.in === loc);

        const left = document.createElement('div');
        const right = document.createElement('div');

        if (op.description) left.appendChild(makeFieldSection('Description', '<p style="font-size:.75rem;color:var(--muted);line-height:1.7">' + esc(op.description) + '</p>'));
        if (byIn('path').length)   left.appendChild(buildParamTable('Path Parameters', byIn('path')));
        if (byIn('query').length)  left.appendChild(buildParamTable('Query Parameters', byIn('query')));
        if (byIn('header').length) left.appendChild(buildParamTable('Header Parameters', byIn('header')));
        if (op.requestBody) {
            const rb = resolveRef(op.requestBody, spec);
            if (rb) left.appendChild(buildRequestBody(rb, spec));
        }

        right.appendChild(buildCurlExample(method, path, op, spec));
        if (op.responses) right.appendChild(buildResponses(op.responses, id, spec));

        const grid = document.createElement('div');
        grid.className = 'endpoint-grid';
        grid.appendChild(left);
        grid.appendChild(right);
        body.appendChild(grid);
        d.appendChild(body);
        return d;
    }

    function buildParamTable(title, params) {
        const rows = params.map(p => {
            const schema = p.schema || {};
            const type = schemaTypeStr(schema);
            const def = schema.default !== undefined ? ' Default: <code style="font-family:var(--mono);font-size:.65rem">' + esc(String(schema.default)) + '</code>' : '';
            return '<tr><td><span class="param-name">' + esc(p.name) + (p.required ? '<span class="param-required">*</span>' : '') + '</span></td>'
                + '<td><span class="param-type">' + esc(type) + '</span></td>'
                + '<td><span class="param-in">' + esc(p.in) + '</span></td>'
                + '<td><span class="param-desc">' + esc(p.description || schema.description || '') + def + '</span></td></tr>';
        }).join('');
        return makeFieldSection(title, '<table class="param-table"><thead><tr><th>Name</th><th>Type</th><th>In</th><th>Description</th></tr></thead><tbody>' + rows + '</tbody></table>');
    }

    function buildRequestBody(rb, spec) {
        const content = rb.content || {};
        const mediaType = Object.keys(content)[0] || 'application/json';
        const schema = resolveRef((content[mediaType] || {}).schema, spec) || {};
        const req = rb.required ? ' <span style="font-size:.65rem;color:var(--red)">required</span>' : '';
        return makeFieldSection('Request Body — ' + mediaType,req + buildSchemaTree(schema, spec));
    }

    function buildSchemaTree(schema, spec) {
        if (!schema) return '<div class="schema-tree"><span style="font-size:.7rem;color:var(--muted)">—</span></div>';
        const resolved = resolveRef(schema, spec) || schema;
        const props = resolved.properties || {};
        const required = resolved.required || [];
        if (!Object.keys(props).length) {
            return '<div class="schema-tree"><span class="schema-type">' + esc(schemaTypeStr(resolved)) + '</span>'
                + (resolved.description ? '<span class="schema-desc" style="margin-left:.5rem">' + esc(resolved.description) + '</span>' : '') + '</div>';
        }
        const rows = Object.entries(props).map(([key, val]) => {
            const rv = resolveRef(val, spec) || val;
            const ex = rv.example !== undefined ? ' e.g. <code style="font-family:var(--mono);font-size:.62rem">' + esc(String(rv.example)) + '</code>' : '';
            return '<div class="schema-row"><span class="schema-key">' + esc(key) + (required.includes(key) ? ' <span class="schema-req">*</span>' : '') + '</span>'
                + '<span class="schema-type">' + esc(schemaTypeStr(rv)) + '</span>'
                + '<span class="schema-desc">' + esc(rv.description || '') + ex + '</span></div>';
        }).join('');
        return '<div class="schema-tree">' + rows + '</div>';
    }

    function buildCurlExample(method, path, op, spec) {
        const servers = spec.servers || (spec.host ? [{ url: (spec.schemes?.[0] || 'https') + '://' + spec.host + (spec.basePath || '') }] : [{ url: 'https://api.example.com' }]);
        const base = servers[0]?.url || 'https://api.example.com';
        const hasBody = ['post','put','patch'].includes(method) && op.requestBody;
        const displayPath = esc(path).replace(/\{([^}]+)\}/g, '<span style="color:#f8c555">{$1}</span>');
        let curl = '<span style="color:#79b8ff">curl</span>';
        if (method !== 'get') curl += ' -X ' + method.toUpperCase();
        curl += ' ' + esc(base) + displayPath;
        if(op.parameters){
            let first = true;
            for(const param of op.parameters){
                if(param.in != "query") continue;
                if(first) {
                    curl += '?';
                    first = false;
                } else {
                    curl += '&';
                }
                curl += `${param.name}`
                switch (param.schema.type) {
                    case "number":
                        curl+="=0";
                        break
                    case "string":
                        curl+="=string";
                        break
                    case "bool":
                        curl+="=true";
                        break
                }
            }
        }

        // curl += '\n  -H <span class="tok-str">"Authorization: Bearer {token}"</span>';
        if (hasBody) {
            const rb = resolveRef(op.requestBody, spec);
            const body = buildExampleBody(resolveRef(Object.values(rb?.content || {})[0]?.schema, spec), spec);
            curl += '\n  -H <span class="tok-str">"Content-Type: application/json"</span>';
            curl += '\n  -d <span class="tok-str">\'' + esc(body) + '\'</span>';
        }

        const fs = document.createElement('div');
        fs.className = 'field-section';
        fs.innerHTML = '<div class="field-section-title">Example Request</div>'
            + '<div class="code-block-header"><span class="code-lang">curl</span><button class="copy-btn" onclick="copyCodeBtn(this)">copy</button></div>'
            + '<div class="code-block">' + curl + '</div>';
        return fs;
    }

    function buildExampleBody(schema, spec, depth = 0) {
        if (!schema || depth > 3) return '{}';
        const resolved = resolveRef(schema, spec) || schema;
        const props = resolved.properties || {};
        if (!Object.keys(props).length) return '{}';
        const obj = {};
        Object.entries(props).forEach(([k, v]) => {
            const rv = resolveRef(v, spec) || v;
            if (rv.example !== undefined) { obj[k] = rv.example; return; }
            const t = schemaTypeStr(rv);
            if (t === 'string') obj[k] = rv.format === 'date-time' ? '2026-01-01T00:00:00Z' : 'string';
            else if (t === 'integer' || t === 'number') obj[k] = 0;
            else if (t === 'boolean') obj[k] = true;
            else if (t === 'array') obj[k] = [];
            else obj[k] = {};
        });
        return JSON.stringify(obj, null, 2);
    }

    function buildResponses(responses, id, spec) {
        const entries = Object.entries(responses);
        const tabs = [], panels = [];
        entries.forEach(([code, respOrRef], i) => {
            const resp = resolveRef(respOrRef, spec) || respOrRef;
            const cat = code.startsWith('2') ? 's2xx' : code.startsWith('4') ? 's4xx' : code.startsWith('5') ? 's5xx' : '';
            const pid = id + '-resp-' + code;
            const active = i === 0 ? ' active' : '';
            tabs.push('<div class="resp-tab ' + cat + active + '" onclick="switchTab(this,\'' + id + '-resp\',\'' + pid + '\')">' + code + '</div>');
            const schema = resolveRef(Object.values(resp.content || {})[0]?.schema, spec);
            const ex = schema ? syntaxHighlight(buildExampleResponse(schema, spec)) : null;
            panels.push('<div class="resp-panel' + active + '" id="' + pid + '">'
                + '<span class="status-chip ' + cat + '"><span class="status-dot"></span>' + code + (resp.description ? ' — ' + esc(resp.description) : '') + '</span>'
                + (ex ? '<div class="code-block">' + ex + '</div>' : '')
                + '</div>');
        });
        const fs = document.createElement('div');
        fs.className = 'field-section';
        fs.innerHTML = '<div class="field-section-title">Responses</div>'
            + '<div class="resp-tabs">' + tabs.join('') + '</div>'
            + '<div id="' + id + '-resp">' + panels.join('') + '</div>';
        return fs;
    }

    function buildExampleResponse(schema, spec, depth = 0) {
        if (depth > 3) return '{}';
        const r = resolveRef(schema, spec) || schema;
        if (r.type === 'array' || r.items) {
            return JSON.stringify([buildExampleObj(resolveRef(r.items, spec) || r.items, spec, depth + 1)], null, 2);
        }
        return JSON.stringify(buildExampleObj(r, spec, depth), null, 2);
    }

    function buildExampleObj(schema, spec, depth = 0) {
        if (depth > 3) return {};
        const r = resolveRef(schema, spec) || schema;
        if (r.example !== undefined) return r.example;
        const props = r.properties || {};
        if (!Object.keys(props).length) {
            const t = schemaTypeStr(r);
            if (t === 'string') return r.format === 'date-time' ? '2026-01-01T00:00:00Z' : 'string';
            if (t === 'integer' || t === 'number') return 0;
            if (t === 'boolean') return true;
            if (t === 'array') return [];
            return {};
        }
        const obj = {};
        Object.entries(props).forEach(([k, v]) => {
            const rv = resolveRef(v, spec) || v;
            if (rv.example !== undefined) { obj[k] = rv.example; return; }
            const t = schemaTypeStr(rv);
            if (t === 'string') obj[k] = rv.format === 'date-time' ? '2026-01-01T00:00:00Z' : 'string';
            else if (t === 'integer' || t === 'number') obj[k] = 0;
            else if (t === 'boolean') obj[k] = true;
            else if (t === 'array') obj[k] = [];
            else if (t === 'object') obj[k] = buildExampleObj(rv, spec, depth + 1);
            else obj[k] = null;
        });
        return obj;
    }

    // ─── HELPERS ───
    function resolveRef(obj, spec) {
        if (!obj || typeof obj !== 'object' || !obj.$ref) return obj;
        let r = spec;
        for (const p of obj.$ref.replace(/^#\//, '').split('/')) { r = r?.[p]; if (!r) return null; }
        return r;
    }

    function resolveParams(params, spec) { return (params || []).map(p => resolveRef(p, spec) || p); }

    function schemaTypeStr(s) {
        if (!s) return 'any';
        if (s.$ref) return s.$ref.split('/').pop();
        if (s.type === 'array') return s.items ? 'array[' + schemaTypeStr(resolveRef(s.items, {}) || s.items) + ']' : 'array';
        if (s.allOf) return 'object';
        if (s.oneOf) return s.oneOf.map(schemaTypeStr).join(' | ');
        if (s.anyOf) return s.anyOf.map(schemaTypeStr).join(' | ');
        if (s.format) return (s.type || 'string') + '(' + s.format + ')';
        return s.type || 'any';
    }

    function makeFieldSection(title, html) {
        const d = document.createElement('div');
        d.className = 'field-section';
        d.innerHTML = '<div class="field-section-title">' + esc(title) + '</div>' + html;
        return d;
    }

    function epId(method, path) { return ('ep-' + method + '-' + path).replace(/[^a-z0-9]/gi, '-').replace(/-+/g, '-').replace(/^-|-$/g, ''); }
    function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-'); }
    function esc(s) { return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function syntaxHighlight(json) {
        return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
                if (/^"/.test(m)) return /:$/.test(m) ? '<span class="tok-key">' + m.slice(0,-1) + '</span>:' : '<span class="tok-str">' + m + '</span>';
                if (/true|false/.test(m)) return '<span class="tok-bool">' + m + '</span>';
                if (/null/.test(m)) return '<span class="tok-null">' + m + '</span>';
                return '<span class="tok-num">' + m + '</span>';
            });
    }

    // ─── UI INTERACTIONS ───
    function toggleEndpoint(id) {
        const el = document.getElementById(id);
        const tog = document.getElementById(id + '-toggle');
        tog.textContent = el.classList.toggle('open') ? '[-]' : '[+]';
    }

    function switchTab(btn, groupId, panelId) {
        btn.parentElement.querySelectorAll('.resp-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(groupId).querySelectorAll('.resp-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
    }

    function expandAll() { document.querySelectorAll('.endpoint').forEach(el => { el.classList.add('open'); const t = el.querySelector('.endpoint-toggle'); if (t) t.textContent = '[-]'; }); }
    function collapseAll() { document.querySelectorAll('.endpoint').forEach(el => { el.classList.remove('open'); const t = el.querySelector('.endpoint-toggle'); if (t) t.textContent = '[+]'; }); }

    function copyCodeBtn(btn) {
        const block = btn.closest('.field-section').querySelector('.code-block');
        if (!block) return;
        const tmp = document.createElement('div');
        tmp.innerHTML = block.innerHTML;
        navigator.clipboard.writeText(tmp.innerText).then(() => {
            const orig = btn.textContent;
            btn.textContent = 'copied!';
            setTimeout(() => btn.textContent = orig, 1500);
        });
    }

    function downloadSpec() {
        if (!rawSpecText) return;
        const isJson = rawSpecText.trimStart()[0] === '{';
        const blob = new Blob([rawSpecText], { type: isJson ? 'application/json' : 'text/yaml' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'openapi.' + (isJson ? 'json' : 'yaml');
        a.click();
    }

    function filterNav(q) {
        q = q.toLowerCase();
        document.querySelectorAll('.nav-item').forEach(item => {
            const t = (item.querySelector('.nav-path')?.textContent || '') + (item.querySelector('.method-badge')?.textContent || '');
            item.style.display = t.toLowerCase().includes(q) ? '' : 'none';
        });
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('open');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('open');
    }

    function initScrollSpy() {
        const navItems = document.querySelectorAll('.nav-item');
        window.addEventListener('scroll', () => {
            let current = '';
            document.querySelectorAll('.endpoint').forEach(s => { if (window.scrollY >= s.offsetTop - 100) current = s.id; });
            navItems.forEach(n => { n.classList.toggle('active', n.getAttribute('href') === '#' + current); });
        }, { passive: true });
    }
</script>
</body>
</html>
